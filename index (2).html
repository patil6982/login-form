<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Login UI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#667eea,#764ba2);
}

/* CONTAINER */
.container{
  width:100%;
  max-width:380px;
  padding:30px;
  border-radius:20px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.08);
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
  text-align:center;
}

/* TITLE */
h2{
  color:white;
  margin-bottom:10px;
}

p{
  color:#ddd;
  font-size:14px;
  margin-bottom:25px;
}

/* INPUT */
.input-group{
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  outline:none;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#4facfe;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

/* EXTRA */
.extra{
  margin-top:15px;
  font-size:13px;
  color:#ccc;
}

.extra span{
  color:#4facfe;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <h2>Welcome Back 👋</h2>
  <p>Login to continue</p>

  <div class="input-group">
    <input type="email" placeholder="Email">
  </div>

  <div class="input-group">
    <input type="password" placeholder="Password">
  </div>

  <button>Login</button>

  <div class="extra">
    Don't have an account? <span>Sign up</span>
  </div>
</div>

</body>
</html>
